<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Nexus 管理控制台{% endblock %}</title>
    <link rel="stylesheet" href="/static/console.css">
    <style>
    .toast { position: fixed; top: 20px; right: 20px; padding: 12px 24px; border-radius: 4px; color: white; z-index: 1000; display: none; }
    .toast.success { background: #22c55e; }
    .toast.error { background: #ef4444; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <h1>AI Nexus</h1>
            <span>业务知识治理层</span>
        </div>
        <nav class="sidebar-nav">
            <a href="/console/" class="nav-item {% if active_page == 'dashboard' %}active{% endif %}">
                <span>📊 仪表板</span>
            </a>
            <a href="/console/entities" class="nav-item {% if active_page == 'entities' %}active{% endif %}">
                <span>🏢 实体管理</span>
            </a>
            <a href="/console/rules" class="nav-item {% if active_page == 'rules' %}active{% endif %}">
                <span>📜 规则管理</span>
            </a>
            <a href="/console/relations" class="nav-item {% if active_page == 'relations' %}active{% endif %}">
                <span>🔗 关系管理</span>
            </a>
            <a href="/console/graph" class="nav-item {% if active_page == 'graph' %}active{% endif %}">
                <span>🌐 知识图谱</span>
            </a>
            <a href="/console/audit" class="nav-item {% if active_page == 'audit' %}active{% endif %}">
                <span>✅ 审核工作流</span>
            </a>
            <a href="/console/lint" class="nav-item {% if active_page == 'lint' %}active{% endif %}">
                <span>🔍 知识 Lint</span>
            </a>
            <a href="/console/imports" class="nav-item {% if active_page == 'imports' %}active{% endif %}">
                <span>📥 导入管理</span>
            </a>
            <a href="/console/settings" class="nav-item {% if active_page == 'settings' %}active{% endif %}">
                <span>⚙️ 系统设置</span>
            </a>
        </nav>
    </aside>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <div id="toast" class="toast"></div>

    <script>
    function showToast(msg, type) {
        const t = document.getElementById('toast');
        t.textContent = msg; t.className = 'toast ' + type; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    // 拦截表单提交，显示 Toast 反馈
    document.addEventListener('DOMContentLoaded', function() {
        document.querySelectorAll('form').forEach(form => {
            form.addEventListener('submit', function(e) {
                const approveBtn = form.querySelector('button[type="submit"]');
                if (approveBtn) {
                    const originalText = approveBtn.textContent;
                    approveBtn.disabled = true;
                    approveBtn.textContent = '处理中...';

                    // 表单提交后会自动跳转，这里设置一个超时防止按钮永久禁用
                    setTimeout(() => {
                        approveBtn.disabled = false;
                        approveBtn.textContent = originalText;
                    }, 5000);
                }
            });
        });
    });
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
